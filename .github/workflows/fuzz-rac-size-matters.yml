name: Fuzz RaC Size Matters

on:
  pull_request:
    paths:
      - 'worlds/rac_size_matters/**'
      - 'fuzz.py'
      - 'hooks/**'
      - '.github/workflows/fuzz-rac-size-matters.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "fuzz-rac-size-matters-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  discover-hooks:
    runs-on: ubuntu-latest
    outputs:
      hooks: ${{ steps.list.outputs.hooks }}
    steps:
      - uses: actions/checkout@v4

      - name: List available fuzz hooks
        id: list
        shell: bash
        run: |
          hooks=$(ls hooks/*.py | xargs -n1 basename | sed 's/\.py$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered hooks: $hooks"
          echo "hooks=$hooks" >> "$GITHUB_OUTPUT"

  fuzz:
    needs: discover-hooks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hook: ${{ fromJson(needs.discover-hooks.outputs.hooks) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '~3.12.7'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run fuzz hook ${{ matrix.hook }}
        id: run_fuzz
        shell: bash
        env:
          HOOK: ${{ matrix.hook }}
        run: |
          set +e
          python fuzz.py -g rac_size_matters -r 150 -j 4 -t 30 \
            --hook "hooks.${HOOK}:Hook" --dump-ignored
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Build hook result fragment
        if: always()
        shell: bash
        env:
          HOOK: ${{ matrix.hook }}
          EXIT_CODE: ${{ steps.run_fuzz.outputs.exit_code }}
        run: |
          python3 - <<'EOF'
          import json
          import os

          hook = os.environ["HOOK"]
          exit_code = os.environ["EXIT_CODE"]
          report_path = "fuzz_output/report.json"

          stats = {"total": 0, "success": 0, "failure": 0, "timeout": 0, "ignored": 0}
          errors = {}

          if os.path.exists(report_path):
              with open(report_path, encoding="utf-8") as fd:
                  report = json.load(fd)
              stats = report.get("stats", stats)
              errors = report.get("errors", {}).get("rac_size_matters", {})

          ok = exit_code == "0"
          icon = "✅" if ok else "❌"

          lines = []
          lines.append(f"<details {'open' if not ok else ''}>")
          lines.append(f"<summary>{icon} <strong>{hook}</strong> &mdash; "
                        f"{stats['success']}/{stats['total']} succeeded "
                        f"({stats['failure']} failed, {stats['timeout']} timed out, "
                        f"{stats['ignored']} ignored)</summary>")
          lines.append("")

          if errors:
              for err_str, yamls in errors.items():
                  count = len(yamls)
                  sample = yamls[:10]
                  lines.append(f"- `{err_str}` &mdash; {count} run(s), e.g. seeds {sample}")
          elif not ok:
              lines.append("- Hook reported failure but no errors were recorded in the report.")
          else:
              lines.append("No errors.")

          lines.append("")
          lines.append("</details>")

          os.makedirs("fragments", exist_ok=True)
          with open(f"fragments/{hook}.md", "w", encoding="utf-8") as fd:
              fd.write("\n".join(lines))
          EOF

      - name: Upload hook result fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-fragment-${{ matrix.hook }}
          path: fragments/

  comment:
    needs: fuzz
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all hook fragments
        uses: actions/download-artifact@v4
        with:
          pattern: fuzz-fragment-*
          path: fragments
          merge-multiple: true

      - name: Assemble PR comment body
        shell: bash
        run: |
          {
            echo "<!-- fuzz-results-rac_size_matters -->"
            echo "## Fuzz results: rac_size_matters"
            echo ""
            echo "Each section below corresponds to one fuzz hook run against \`rac_size_matters\`."
            echo ""
            for f in $(ls fragments/*.md | sort); do
              cat "$f"
              echo ""
            done
          } > comment_body.md
          cat comment_body.md

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment_body.md', 'utf8');
            const marker = '<!-- fuzz-results-rac_size_matters -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
