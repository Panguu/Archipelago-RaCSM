name: Build and Release RaC Size Matters APWorld

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Is this a pre-release?"
        type: boolean
        required: true
        default: false
      custom_version:
        description: "Optional exact version (leave blank to auto-generate)"
        required: false

concurrency:
  group: "build-release-rac-size-matters"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.branch.outputs.branch }}

    steps:
      - name: Determine branch to build
        id: branch
        shell: bash
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Manual trigger - using branch: $branch"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '~3.12.7'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Run tests
        run: pytest worlds/rac_size_matters/test -n auto

      - name: Build .apworld for rac_size_matters
        shell: bash
        run: |
          echo "Building rac_size_matters.apworld..."
          python3 - <<'EOF'
          import sys, os, zipfile
          sys.path.insert(0, os.path.abspath("."))
          from worlds import Files
          from Utils import Version

          class MyWorldContainer(Files.APWorldContainer):
              def write_contents(self, opened_zipfile: zipfile.ZipFile) -> None:
                  super().write_contents(opened_zipfile)
                  for root, dirs, files in os.walk(self.world_folder):
                      for file in files:
                          if file.endswith(".pyc") or file == "archipelago.json":
                              continue
                          full_path = os.path.join(root, file)
                          rel_path = os.path.relpath(full_path, self.world_folder)
                          zip_path = os.path.join("rac_size_matters", rel_path).replace("\\", "/")
                          opened_zipfile.write(full_path, zip_path)

          src_folder = "worlds/rac_size_matters"
          dest_file = "rac_size_matters.apworld"

          world = MyWorldContainer(dest_file)
          world.game = "Ratchet & Clank: Size Matters"
          world.world_folder = src_folder
          world.world_version = Version(1, 0, 0)
          world.minimum_ap_version = Version(0, 5, 0)

          world.write()
          print(f"Successfully created {dest_file}")
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rac_size_matters.apworld
          path: ./rac_size_matters.apworld

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.branch }}
          fetch-depth: 0

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: rac_size_matters.apworld
          path: .

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine next semantic version
        id: semver
        shell: bash
        run: |
          set -e
          branch="${{ needs.build.outputs.branch }}"
          git fetch --tags

          echo "Determining next semantic version for branch: $branch"

          latest_tag=$(git tag --sort=-v:refname | grep -E '^rac-size-matters-v' | head -n 1 || true)
          [[ -z "$latest_tag" ]] && latest_tag="rac-size-matters-v0.0.0"
          echo "Latest tag: $latest_tag"

          tag_stripped="${latest_tag#rac-size-matters-v}"
          IFS='.' read -r major minor patch <<< "$tag_stripped"
          major=${major:-0}; minor=${minor:-0}; patch=${patch:-0}

          manual_pre="${{ github.event.inputs.prerelease }}"
          custom_version="${{ github.event.inputs.custom_version }}"

          if [[ -n "$custom_version" ]]; then
              custom_version="$(echo -n "$custom_version" | xargs)"
              echo "Custom version provided: $custom_version"

              if [[ "$custom_version" == *"-pre" ]]; then
                  is_pre="true"
              else
                  is_pre="false"
              fi

              echo "version=$custom_version" >> "$GITHUB_OUTPUT"
              echo "is_pre=$is_pre" >> "$GITHUB_OUTPUT"
              echo "branch=$branch" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          is_pre="$manual_pre"

          if [[ "$is_pre" == "true" ]]; then
              patch=$((patch + 1))
              version="${major}.${minor}.${patch}-pre"
          else
              minor=$((minor + 1))
              patch=0
              version="${major}.${minor}.${patch}"
          fi

          echo "Next version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "is_pre=$is_pre" >> "$GITHUB_OUTPUT"

      - name: Update archipelago.json manifest version
        shell: bash
        run: |
          set -e
          version="${{ steps.semver.outputs.version }}"
          version="${version#v}"
          version="${version%-pre}"

          mkdir -p tmp_unzip
          unzip -o -q rac_size_matters.apworld -d tmp_unzip

          jq --arg world_version "$version" \
             '.world_version = $world_version' \
             tmp_unzip/archipelago.json > tmp_unzip/archipelago.json.tmp
          mv tmp_unzip/archipelago.json.tmp tmp_unzip/archipelago.json

          find tmp_unzip/rac_size_matters -type f -name 'archipelago.json' -exec rm {} \;

          cd tmp_unzip
          zip -qr ../rac_size_matters.apworld *
          cd ..

          echo "Updated archipelago.json with version $version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rac_size_matters.apworld
          tag_name: rac-size-matters-v${{ steps.semver.outputs.version }}
          name: "RaC Size Matters APWorld v${{ steps.semver.outputs.version }}"
          body: "Generating release notes..."
          prerelease: ${{ steps.semver.outputs.is_pre == 'true' }}
          target_commitish: ${{ needs.build.outputs.branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        shell: bash
        run: |
          set -e
          repo_url="https://github.com/${{ github.repository }}"
          branch="${{ steps.semver.outputs.branch }}"
          new_tag="rac-size-matters-v${{ steps.semver.outputs.version }}"

          git fetch --tags

          if [[ "$branch" == "main" ]]; then
            prev_tag=$(git tag --sort=-v:refname | grep -E '^rac-size-matters-v' | grep -v -- '-pre' | grep -v "^$new_tag\$" | head -n 1)
          else
            prev_tag=$(git tag --sort=-v:refname | grep -E '^rac-size-matters-v' | grep -v "^$new_tag\$" | head -n 1)
          fi

          if [[ -z "$prev_tag" ]]; then
            changelog="${repo_url}/commits/${branch}"
            commit_list=$(git log "$new_tag" --pretty=format:"- %s (%h)" -- "worlds/rac_size_matters/")
          else
            changelog="${repo_url}/compare/${prev_tag}...${new_tag}"
            commit_list=$(git log "${prev_tag}..${new_tag}" --pretty=format:"- %s (%h)" -- "worlds/rac_size_matters/")
          fi

          if [[ -z "$commit_list" ]]; then
              commit_list="- (no new commits since last relevant release)"
          fi

          cat <<EOF > release_notes.md
          ## RaC Size Matters APWorld ${new_tag}

          **Branch:** ${branch}
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          <details>
          <summary><strong>Changes since ${prev_tag:-initial commit}</strong></summary>

          ${commit_list}

          </details>

          **Full changelog and compare**: ${changelog}

          ### Notes
          This release was automatically generated from the **${branch}** branch.
          Latest (main) releases are recommended, as pre-releases (staging) may contain experimental or in-progress changes.
          EOF

      - name: Update GitHub Release with generated notes
        shell: bash
        run: |
          new_tag="rac-size-matters-v${{ steps.semver.outputs.version }}"
          gh release edit "$new_tag" --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
